<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Mode (Working Demo)</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:#0f172a;
      --panel2:#0b1224;
      --border:#1f2a44;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#60a5fa;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#f87171;
      --bubbleUser:#1d4ed8;
      --bubbleAgent:#111827;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 900px at 20% 0%, rgba(96,165,250,.18), transparent 60%),
                  radial-gradient(900px 700px at 100% 40%, rgba(52,211,153,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:10;
      background: linear-gradient(to bottom, rgba(11,15,23,.92), rgba(11,15,23,.7));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(31,42,68,.65);
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px;
      max-width: 1320px; margin:0 auto;
    }
    .brand{
      display:flex; gap:10px; align-items:center;
      font-weight:700;
      letter-spacing:.2px;
    }
    .dot{
      width:12px; height:12px; border-radius:99px;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(96,165,250,.55);
    }
    .controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    button, .pill{
      border:1px solid rgba(31,42,68,.9);
      background: rgba(15,23,42,.65);
      color:var(--text);
      padding:9px 12px;
      border-radius: 999px;
      cursor:pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
      transition: transform .04s ease, border-color .2s ease, background .2s ease;
      font-size: 13px;
    }
    button:hover{ border-color: rgba(96,165,250,.55); background: rgba(15,23,42,.85); }
    button:active{ transform: translateY(1px); }
    button.primary{
      border-color: rgba(96,165,250,.75);
      background: rgba(29,78,216,.25);
    }
    button.danger{
      border-color: rgba(248,113,113,.7);
      background: rgba(248,113,113,.12);
    }
    .pill{
      cursor:default;
      font-family: var(--mono);
      color: var(--muted);
    }
    .layout{
      max-width:1320px;
      margin: 18px auto 40px auto;
      padding: 0 18px;
      display:grid;
      grid-template-columns: 340px 1fr 380px;
      gap:14px;
    }
    .card{
      background: linear-gradient(to bottom, rgba(15,23,42,.85), rgba(11,18,36,.72));
      border:1px solid rgba(31,42,68,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-height: 220px;
    }
    .card h2{
      margin:0;
      padding:14px 14px 10px 14px;
      font-size: 13px;
      letter-spacing:.25px;
      color: var(--muted);
      border-bottom:1px solid rgba(31,42,68,.75);
      background: rgba(2,6,23,.25);
    }
    .card .content{ padding: 12px 14px; }
    .tasks{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .taskItem{
      border:1px solid rgba(31,42,68,.8);
      border-radius: 12px;
      padding:10px;
      background: rgba(11,18,36,.35);
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .taskTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .taskTitle{ font-weight:650; font-size: 14px; }
    .taskMeta{
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    .taskBtns{ display:flex; gap:8px; flex-wrap:wrap; }
    .tiny{
      padding:6px 10px; font-size:12px;
      border-radius: 999px;
    }
    .divider{ height:1px; background: rgba(31,42,68,.75); margin: 10px 0; }
    textarea, input, select{
      width:100%;
      background: rgba(2,6,23,.35);
      border:1px solid rgba(31,42,68,.85);
      border-radius: 12px;
      color: var(--text);
      padding:10px;
      outline:none;
      font-family: var(--sans);
      font-size: 13px;
    }
    textarea{ min-height: 155px; resize: vertical; }
    label{
      display:block;
      margin:10px 0 6px 0;
      font-size: 12px;
      color: var(--muted);
    }
    .chatWrap{
      display:flex;
      flex-direction:column;
      height: 78vh;
      min-height: 560px;
    }
    .chat{
      flex: 1;
      overflow:auto;
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      scroll-behavior:smooth;
    }
    .msgRow{ display:flex; gap:10px; align-items:flex-end; }
    .avatar{
      width:28px; height:28px; border-radius: 999px;
      border:1px solid rgba(31,42,68,.85);
      background: rgba(15,23,42,.7);
      display:flex; align-items:center; justify-content:center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      flex: 0 0 auto;
    }
    .bubble{
      max-width: 78%;
      border-radius: 16px;
      padding: 10px 12px;
      border:1px solid rgba(31,42,68,.85);
      background: rgba(17,24,39,.8);
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user .bubble{
      background: rgba(29,78,216,.22);
      border-color: rgba(96,165,250,.6);
    }
    .agent .bubble{
      background: rgba(17,24,39,.82);
    }
    .metaLine{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }
    .composer{
      border-top:1px solid rgba(31,42,68,.75);
      padding: 12px;
      display:flex;
      gap:10px;
      background: rgba(2,6,23,.18);
    }
    .composer input{
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 13px;
    }
    .log{
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(2,6,23,.32);
      border:1px solid rgba(31,42,68,.8);
      border-radius: 12px;
      padding:10px;
      min-height: 220px;
      max-height: 46vh;
      overflow:auto;
      white-space: pre-wrap;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding:7px 10px;
      border-radius: 999px;
      border:1px solid rgba(31,42,68,.85);
      background: rgba(2,6,23,.2);
    }
    .dotSmall{
      width:8px; height:8px; border-radius:99px;
      background: var(--warn);
      box-shadow: 0 0 14px rgba(251,191,36,.35);
    }
    .row{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .statusGood .dotSmall{ background: var(--good); box-shadow: 0 0 14px rgba(52,211,153,.35); }
    .statusBad .dotSmall{ background: var(--bad); box-shadow: 0 0 14px rgba(248,113,113,.35); }
    .toolGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .toolBox{
      border:1px solid rgba(31,42,68,.8);
      border-radius: 12px;
      padding:10px;
      background: rgba(11,18,36,.35);
    }
    .toolBox .name{
      font-family: var(--mono);
      color: var(--text);
      font-size: 12px;
      margin-bottom:6px;
    }
    .toolBox .desc{
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-bottom:10px;
    }
    .footerHint{
      color: var(--muted);
      font-size: 12px;
      padding: 0 2px;
      line-height: 1.45;
    }
    @media (max-width: 1160px){
      .layout{ grid-template-columns: 1fr; }
      .chatWrap{ height: 64vh; }
    }
  </style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>Agent Mode</span>
      <span class="pill" id="clock">local</span>
    </div>
    <div class="controls">
      <button class="primary" id="btnRun">Run plan</button>
      <button id="btnNewTask">New task</button>
      <button id="btnSave">Save</button>
      <button id="btnLoad">Load</button>
      <button class="danger" id="btnReset">Reset</button>
    </div>
  </div>
</header>

<main class="layout">
  <!-- Left: Tasks -->
  <section class="card">
    <h2>Tasks</h2>
    <div class="content">
      <div class="tasks" id="tasks"></div>

      <div class="divider"></div>

      <label>Task title</label>
      <input id="taskTitle" placeholder="e.g., Plan a 3-day Istanbul itinerary" />

      <label>Goal (user request)</label>
      <textarea id="taskGoal" placeholder="Describe what the agent should accomplish..."></textarea>

      <div class="row" style="margin-top:10px;">
        <button class="primary tiny" id="btnCreateTask">Create / Update</button>
        <button class="tiny" id="btnDeleteTask">Delete</button>
      </div>

      <div class="divider"></div>
      <div class="footerHint">
        Tip: Pick a task, then hit <b>Run plan</b>. The agent will execute steps and call mock tools.
      </div>
    </div>
  </section>

  <!-- Middle: Chat -->
  <section class="card chatWrap">
    <h2>Conversation</h2>
    <div class="chat" id="chat"></div>
    <div class="composer">
      <input id="userInput" placeholder="Message the agent  (try: 'Find caf s near Galata Tower')" />
      <button class="primary" id="btnSend">Send</button>
    </div>
  </section>

  <!-- Right: Plan + Tools -->
  <section class="card">
    <h2>Plan & Tools</h2>
    <div class="content">
      <div class="row" style="justify-content:space-between; margin-bottom:10px;">
        <div class="badge" id="statusBadge"><span class="dotSmall"></span><span id="statusText">idle</span></div>
        <div class="badge">tools: <span id="toolCount"></span></div>
      </div>

      <label>Plan (editable)</label>
      <textarea id="plan" spellcheck="false"></textarea>

      <div class="row" style="margin-top:10px;">
        <button class="tiny" id="btnAutoplan">Auto-generate plan</button>
        <button class="tiny" id="btnClearLog">Clear log</button>
      </div>

      <label style="margin-top:14px;">Execution log</label>
      <div class="log" id="log"></div>

      <div class="divider"></div>
      <label>Mock tools</label>
      <div class="toolGrid" id="toolGrid"></div>
    </div>
  </section>
</main>

<script>
/**
 * Agent Mode   single-file demo
 * - Everything is local (no server).
 * - Tools are mocked but behave realistically (async, logs, structured results).
 */

const $ = (sel) => document.querySelector(sel);
const chatEl = $("#chat");
const logEl = $("#log");
const planEl = $("#plan");
const statusBadge = $("#statusBadge");
const statusText = $("#statusText");
const toolGrid = $("#toolGrid");
const toolCount = $("#toolCount");
const tasksEl = $("#tasks");
const clockEl = $("#clock");

const storageKey = "agent_mode_demo_v1";

let state = {
  tasks: [],
  activeTaskId: null,
  messages: [], // {role:'user'|'agent'|'system', text, ts}
  running: false,
};

function nowTime(){
  const d = new Date();
  return d.toLocaleString([], { year:"numeric", month:"short", day:"2-digit", hour:"2-digit", minute:"2-digit" });
}

function setStatus(kind, text){
  statusBadge.classList.remove("statusGood","statusBad");
  statusText.textContent = text;
  if(kind === "good") statusBadge.classList.add("statusGood");
  if(kind === "bad") statusBadge.classList.add("statusBad");
}

function log(line){
  const ts = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  logEl.textContent += `[${ts}] ${line}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function addMessage(role, text){
  state.messages.push({ role, text, ts: Date.now() });
  renderChat();
}

function renderChat(){
  chatEl.innerHTML = "";
  for(const m of state.messages){
    const row = document.createElement("div");
    row.className = "msgRow " + (m.role === "user" ? "user" : "agent");
    const av = document.createElement("div");
    av.className = "avatar";
    av.textContent = m.role === "user" ? "U" : "A";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = m.text;

    const wrap = document.createElement("div");
    wrap.appendChild(bubble);

    const meta = document.createElement("div");
    meta.className = "metaLine";
    meta.textContent = new Date(m.ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    wrap.appendChild(meta);

    row.appendChild(av);
    row.appendChild(wrap);
    chatEl.appendChild(row);
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ----------------------- Tasks -----------------------
function uid(){
  return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);
}

function getActiveTask(){
  return state.tasks.find(t => t.id === state.activeTaskId) || null;
}

function renderTasks(){
  tasksEl.innerHTML = "";
  if(state.tasks.length === 0){
    const empty = document.createElement("div");
    empty.className = "footerHint";
    empty.textContent = "No tasks yet. Create one below.";
    tasksEl.appendChild(empty);
    return;
  }

  for(const t of state.tasks){
    const item = document.createElement("div");
    item.className = "taskItem";

    const top = document.createElement("div");
    top.className = "taskTop";

    const title = document.createElement("div");
    title.className = "taskTitle";
    title.textContent = t.title || "(untitled)";

    const meta = document.createElement("div");
    meta.className = "taskMeta";
    meta.textContent = t.updatedAt ? `updated ${new Date(t.updatedAt).toLocaleDateString()}` : "new";

    top.appendChild(title);
    top.appendChild(meta);

    const goal = document.createElement("div");
    goal.className = "footerHint";
    goal.textContent = (t.goal || "").slice(0, 120) + ((t.goal||"").length > 120 ? " " : "");

    const btns = document.createElement("div");
    btns.className = "taskBtns";

    const selectBtn = document.createElement("button");
    selectBtn.className = "tiny primary";
    selectBtn.textContent = (t.id === state.activeTaskId) ? "Selected" : "Select";
    selectBtn.onclick = () => {
      state.activeTaskId = t.id;
      $("#taskTitle").value = t.title;
      $("#taskGoal").value = t.goal;
      planEl.value = t.plan || defaultPlan(t.goal);
      renderTasks();
      log(`Selected task: ${t.title}`);
    };

    const chatBtn = document.createElement("button");
    chatBtn.className = "tiny";
    chatBtn.textContent = "Open context";
    chatBtn.onclick = () => {
      addMessage("agent", `Active task: "${t.title}".\nGoal: ${t.goal}`);
    };

    btns.appendChild(selectBtn);
    btns.appendChild(chatBtn);

    item.appendChild(top);
    item.appendChild(goal);
    item.appendChild(btns);
    tasksEl.appendChild(item);
  }
}

// ----------------------- Tools (Mock) -----------------------
const tools = {
  "web.search": {
    desc: "Search the web (mock). Returns top results with titles and snippets.",
    run: async ({ query }) => {
      await sleep(450);
      // mock results based on keywords
      const q = (query||"").toLowerCase();
      const base = [
        { title: "Example Directory", url: "https://example.com", snippet: "A placeholder site used for demos and documentation." },
        { title: "Local Guide", url: "https://local.example/guide", snippet: "Tips, routes, and recommendations based on your query." },
        { title: "Community Thread", url: "https://forum.example/thread", snippet: "People discussing the same topic with practical advice." },
      ];
      if(q.includes("cafe") || q.includes("coffee")) base.unshift(
        { title: "Top Caf s Near You", url: "https://maps.example/cafes", snippet: "Curated caf  list with hours and reviews." }
      );
      if(q.includes("istanbul")) base.unshift(
        { title: "Istanbul Travel Notes", url: "https://travel.example/istanbul", snippet: "Neighborhoods, transport, and itinerary ideas." }
      );
      return { query, results: base.slice(0, 4) };
    }
  },
  "calendar.lookup": {
    desc: "Look up availability (mock). Returns free/busy blocks.",
    run: async ({ date }) => {
      await sleep(350);
      const d = date || new Date().toISOString().slice(0,10);
      return {
        date: d,
        busy: [
          { start: `${d}T11:00`, end: `${d}T12:00`, title: "Gym" },
          { start: `${d}T16:30`, end: `${d}T17:30`, title: "Call" },
        ],
        freeSuggestion: `${d}T19:00`
      };
    }
  },
  "file.read": {
    desc: "Read a file (mock). Returns a pretend document excerpt.",
    run: async ({ path }) => {
      await sleep(300);
      return {
        path,
        content:
`# Notes (${path})
- Key constraints: keep it simple, working, and readable.
- Output: a structured result + next steps.
- Remember: don't overcomplicate.`
      };
    }
  },
  "math.solve": {
    desc: "Solve simple calculations (real).",
    run: async ({ expression }) => {
      await sleep(120);
      // very small safe eval
      if(!/^[0-9+\-*/().\s]+$/.test(expression||"")) throw new Error("Expression contains invalid characters.");
      const val = Function(`"use strict"; return (${expression});`)();
      return { expression, result: val };
    }
  }
};

function renderTools(){
  toolGrid.innerHTML = "";
  const keys = Object.keys(tools);
  toolCount.textContent = String(keys.length);
  for(const k of keys){
    const box = document.createElement("div");
    box.className = "toolBox";
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = k;
    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = tools[k].desc;

    const btn = document.createElement("button");
    btn.className = "tiny";
    btn.textContent = "Test";
    btn.onclick = async () => {
      try{
        setStatus("good","running tool ");
        log(`TOOL CALL -> ${k}`);
        const res = await tools[k].run(k === "web.search" ? {query:"demo"} :
                                      k === "calendar.lookup" ? {date:new Date().toISOString().slice(0,10)} :
                                      k === "file.read" ? {path:"/demo/notes.md"} :
                                      {expression:"(2+3)*4"});
        log(`TOOL RESULT <- ${k}: ${JSON.stringify(res, null, 2)}`);
        setStatus("good","idle");
      }catch(e){
        log(`TOOL ERROR <- ${k}: ${e.message}`);
        setStatus("bad","tool error");
      }
    };

    box.appendChild(name);
    box.appendChild(desc);
    box.appendChild(btn);
    toolGrid.appendChild(box);
  }
}

// ----------------------- Agent logic -----------------------
function defaultPlan(goalText){
  const g = (goalText||"").trim() || "Complete the user request.";
  return `1) Restate the goal clearly.
2) Identify missing info (if any) and make reasonable assumptions.
3) Use tools if helpful:
   - web.search for quick context
   - calendar.lookup to suggest timings (if scheduling)
   - file.read if referencing local docs
   - math.solve for calculations
4) Produce a clean final answer with steps and next actions.

Goal: ${g}`;
}

function autoplanFromInput(userText){
  const t = (userText||"").trim();
  if(!t) return defaultPlan("Complete the user request.");
  const wantsSchedule = /schedule|meeting|tomorrow|today|date|time|calendar/i.test(t);
  const wantsSearch = /find|search|near|best|recommend|caf|restaurant|source|latest/i.test(t);

  return `Goal: ${t}

Plan:
1) Understand the request and expected output format.
2) Decide what to assume vs what to ask. Prefer assumptions for a demo.
3) ${wantsSearch ? "Call web.search to gather quick context." : "Skip web.search unless needed."}
4) ${wantsSchedule ? "Call calendar.lookup to propose an available time." : "Skip calendar.lookup unless needed."}
5) Draft the response with:
   - bullet points
   - a short recommendation
   - a clear next step for the user
6) End with a concise confirmation.`;
}

function parsePlanSteps(planText){
  // Very forgiving: parse lines that look like "1) ..." or "- ..."
  const lines = planText.split("\n").map(s => s.trim()).filter(Boolean);
  const steps = [];
  for(const line of lines){
    if(/^\d+\)/.test(line) || /^- /.test(line) || /^\d+\./.test(line)){
      steps.push(line.replace(/^\d+[.)]\s*/,"").replace(/^- /,""));
    }
  }
  // fallback: if none found, treat whole plan as 1 step
  if(steps.length === 0) steps.push(planText.trim());
  return steps;
}

async function agentRun(){
  if(state.running) return;
  const task = getActiveTask();
  const planText = planEl.value.trim();
  const goal = task?.goal || inferGoalFromChat() || "Complete the user request.";

  state.running = true;
  setStatus("good", "running ");
  log(`AGENT START. Goal: ${goal}`);

  // Step 0: show an agent message that it is starting
  addMessage("agent", `Got it. I m going to work on:\n"${goal}"\n\nI ll follow the plan and show tool calls in the log.`);

  const steps = parsePlanSteps(planText || defaultPlan(goal));
  for(let i=0;i<steps.length;i++){
    const step = steps[i];
    log(`STEP ${i+1}/${steps.length}: ${step}`);

    // Heuristics: call tools based on keywords in step
    const low = step.toLowerCase();

    try{
      if(low.includes("web.search") || low.includes("search") || low.includes("context")){
        const q = goal;
        log(`TOOL CALL -> web.search { query: "${q}" }`);
        const res = await tools["web.search"].run({ query: q });
        log(`TOOL RESULT <- web.search: ${JSON.stringify(res, null, 2)}`);
      }

      if(low.includes("calendar") || low.includes("availability") || low.includes("time")){
        const d = new Date().toISOString().slice(0,10);
        log(`TOOL CALL -> calendar.lookup { date: "${d}" }`);
        const res = await tools["calendar.lookup"].run({ date: d });
        log(`TOOL RESULT <- calendar.lookup: ${JSON.stringify(res, null, 2)}`);
      }

      if(low.includes("file") || low.includes("read")){
        log(`TOOL CALL -> file.read { path: "/demo/notes.md" }`);
        const res = await tools["file.read"].run({ path: "/demo/notes.md" });
        log(`TOOL RESULT <- file.read: ${JSON.stringify(res, null, 2)}`);
      }

      if(low.includes("calculate") || low.includes("math")){
        log(`TOOL CALL -> math.solve { expression: "12*(3+1)" }`);
        const res = await tools["math.solve"].run({ expression: "12*(3+1)" });
        log(`TOOL RESULT <- math.solve: ${JSON.stringify(res, null, 2)}`);
      }

      // Simulate thinking time
      await sleep(250);

    }catch(e){
      log(`ERROR in step "${step}": ${e.message}`);
      setStatus("bad","error");
      addMessage("agent", `I hit an error while running a step: ${e.message}\nYou can edit the plan and try again.`);
      state.running = false;
      return;
    }
  }

  // Final response synthesis (demo)
  const final = formatFinalAnswer(goal);
  addMessage("agent", final);

  log("AGENT DONE.");
  setStatus("good","idle");
  state.running = false;

  // persist plan into task if active
  if(task){
    task.plan = planEl.value;
    task.updatedAt = Date.now();
    renderTasks();
  }
}

function inferGoalFromChat(){
  // last user message
  for(let i=state.messages.length-1;i>=0;i--){
    if(state.messages[i].role === "user") return state.messages[i].text;
  }
  return "";
}

function formatFinalAnswer(goal){
  const hints = [
    "Here s a clean, actionable output:",
    "",
    "  Summary: " + goal,
    "  What I did: followed the plan and ran relevant tools (see log).",
    "  Result: this is a working  Agent Mode  demo UI with tasks, plan editing, and tool-call simulation.",
    "",
    "Next step:",
    "1) Edit the plan panel to change behavior (add/remove steps).",
    "2) Create multiple tasks and switch between them.",
    "3) Replace mock tools with real APIs (server) when you re ready.",
  ];
  return hints.join("\n");
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

// ----------------------- Storage -----------------------
function saveAll(){
  // keep current plan in active task
  const task = getActiveTask();
  if(task){
    task.plan = planEl.value;
    task.updatedAt = Date.now();
  }

  const payload = JSON.stringify({
    tasks: state.tasks,
    activeTaskId: state.activeTaskId,
    messages: state.messages
  });
  localStorage.setItem(storageKey, payload);
  log("Saved to LocalStorage.");
}

function loadAll(){
  const raw = localStorage.getItem(storageKey);
  if(!raw){
    log("Nothing saved yet.");
    return;
  }
  try{
    const data = JSON.parse(raw);
    state.tasks = data.tasks || [];
    state.activeTaskId = data.activeTaskId || (state.tasks[0]?.id ?? null);
    state.messages = data.messages || [];
    renderTasks();
    renderChat();
    // restore plan
    const task = getActiveTask();
    planEl.value = task?.plan || defaultPlan(task?.goal || inferGoalFromChat() || "");
    log("Loaded from LocalStorage.");
  }catch(e){
    log("Load failed: " + e.message);
  }
}

function resetAll(){
  state = { tasks: [], activeTaskId: null, messages: [], running:false };
  planEl.value = defaultPlan("");
  renderTasks();
  renderChat();
  logEl.textContent = "";
  setStatus("good","idle");
  log("Reset complete.");
}

// ----------------------- UI wiring -----------------------
$("#btnSend").onclick = () => {
  const text = $("#userInput").value.trim();
  if(!text) return;
  $("#userInput").value = "";
  addMessage("user", text);

  // Update active task goal (nice for demo)
  const task = getActiveTask();
  if(task){
    task.goal = text;
    task.updatedAt = Date.now();
    $("#taskGoal").value = text;
    planEl.value = autoplanFromInput(text);
    renderTasks();
  }else{
    planEl.value = autoplanFromInput(text);
  }
};

$("#userInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    $("#btnSend").click();
  }
});

$("#btnRun").onclick = agentRun;

$("#btnAutoplan").onclick = () => {
  const goal = $("#taskGoal").value.trim() || inferGoalFromChat() || "Complete the user request.";
  planEl.value = autoplanFromInput(goal);
  log("Auto-generated plan.");
};

$("#btnClearLog").onclick = () => { logEl.textContent = ""; log("Log cleared."); };

$("#btnNewTask").onclick = () => {
  const t = {
    id: uid(),
    title: "New task",
    goal: "",
    plan: "",
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  state.tasks.unshift(t);
  state.activeTaskId = t.id;
  $("#taskTitle").value = t.title;
  $("#taskGoal").value = t.goal;
  planEl.value = defaultPlan(t.goal);
  renderTasks();
  log("Created a new task.");
};

$("#btnCreateTask").onclick = () => {
  const title = $("#taskTitle").value.trim() || "Untitled task";
  const goal = $("#taskGoal").value.trim();
  let task = getActiveTask();
  if(!task){
    task = { id: uid(), title, goal, plan: planEl.value, createdAt: Date.now(), updatedAt: Date.now() };
    state.tasks.unshift(task);
    state.activeTaskId = task.id;
    log("Created task (no previous active task).");
  }else{
    task.title = title;
    task.goal = goal;
    task.plan = planEl.value;
    task.updatedAt = Date.now();
    log("Updated active task.");
  }
  renderTasks();
};

$("#btnDeleteTask").onclick = () => {
  const task = getActiveTask();
  if(!task) return;
  state.tasks = state.tasks.filter(t => t.id !== task.id);
  state.activeTaskId = state.tasks[0]?.id ?? null;
  const newActive = getActiveTask();
  $("#taskTitle").value = newActive?.title ?? "";
  $("#taskGoal").value = newActive?.goal ?? "";
  planEl.value = newActive?.plan || defaultPlan(newActive?.goal || "");
  renderTasks();
  log("Deleted task.");
};

$("#btnSave").onclick = saveAll;
$("#btnLoad").onclick = loadAll;
$("#btnReset").onclick = () => {
  localStorage.removeItem(storageKey);
  resetAll();
};

// ----------------------- Init -----------------------
function init(){
  clockEl.textContent = nowTime();
  setInterval(()=> clockEl.textContent = nowTime(), 1000 * 30);

  renderTools();
  setStatus("good","idle");

  // bootstrap default task for nicer first impression
  const t = { id: uid(), title:"Demo task", goal:"Build a working Agent Mode website demo.", plan:"", createdAt:Date.now(), updatedAt:Date.now() };
  state.tasks = [t];
  state.activeTaskId = t.id;
  $("#taskTitle").value = t.title;
  $("#taskGoal").value = t.goal;
  planEl.value = defaultPlan(t.goal);

  addMessage("agent",
`Welcome to Agent Mode (demo).
Try:
- Send a message like  Find caf s near Galata Tower 
- Edit the plan
- Click  Run plan  and watch the tool calls in the log.`);
  renderTasks();
  renderChat();
}
init();
</script>
